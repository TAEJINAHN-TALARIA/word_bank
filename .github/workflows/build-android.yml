name: Build Android APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  pull_request:
    branches:
      - master
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Set up google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          else
            cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project-id",
              "storage_bucket": "dummy-project-id.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.taejinahn.wordbank"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "dummy_api_key" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Validate google-services.json (not dummy / valid JSON)
        run: |
          python - << 'PY'
          import json
          import sys

          path = "android/app/google-services.json"
          try:
              with open(path, "r", encoding="utf-8") as f:
                  data = json.load(f)
          except json.JSONDecodeError as e:
              raise SystemExit(
                  "google-services.json is not valid JSON. "
                  "If GOOGLE_SERVICES_JSON is base64, store the raw JSON instead."
              ) from e

          project_id = data.get("project_info", {}).get("project_id", "")
          if not project_id or project_id.startswith("dummy-"):
              raise SystemExit(
                  "google-services.json looks like the dummy placeholder. "
                  "Set the GOOGLE_SERVICES_JSON secret to your real file contents."
              )

          # Quick sanity: ensure an Android OAuth client exists
          has_android_oauth = False
          for client in data.get("client", []):
              for oc in client.get("oauth_client", []):
                  if oc.get("client_type") == 1:
                      has_android_oauth = True
                      break
          if not has_android_oauth:
              raise SystemExit(
                  "No Android OAuth client found in google-services.json. "
                  "Download a fresh file from Firebase for the correct app."
              )

          print(f"google-services.json OK (project_id={project_id})")
          PY

      - name: Restore debug keystore (consistent SHA-1 for Google Sign-In)
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          if [ -n "$DEBUG_KEYSTORE" ]; then
            mkdir -p ~/.android
            echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore
          fi

      - name: Verify debug keystore SHA-1
        run: |
          if [ -f ~/.android/debug.keystore ]; then
            keytool -list -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android -keypass android 2>/dev/null | grep "SHA1:"
          else
            echo "No custom debug.keystore found — using auto-generated one"
            keytool -list -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android -keypass android 2>/dev/null | grep "SHA1:" || echo "Keystore not yet generated"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }}

      - name: Print APK signing SHA-1
        run: |
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            keytool -printcert -jarfile build/app/outputs/flutter-apk/app-debug.apk | grep -i "SHA1:"
          else
            echo "APK not found at build/app/outputs/flutter-apk/app-debug.apk"
            exit 1
          fi

      - name: Verify Google Sign-In SHA-1 matches google-services.json
        run: |
          python - << 'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          path = "android/app/google-services.json"
          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          certs = []
          for client in data.get("client", []):
              for oc in client.get("oauth_client", []):
                  if oc.get("client_type") == 1:
                      h = oc.get("android_info", {}).get("certificate_hash")
                      if h:
                          certs.append(h.replace(":", "").lower())

          if not certs:
              raise SystemExit("No Android certificate_hash found in google-services.json.")

          keystore = os.path.expanduser("~/.android/debug.keystore")
          if not os.path.exists(keystore):
              raise SystemExit("debug.keystore not found after build.")

          out = subprocess.check_output(
              [
                  "keytool",
                  "-list",
                  "-v",
                  "-keystore",
                  keystore,
                  "-alias",
                  "androiddebugkey",
                  "-storepass",
                  "android",
                  "-keypass",
                  "android",
              ],
              text=True,
              stderr=subprocess.STDOUT,
          )
          m = re.search(r"SHA1:\s*([0-9A-F:]{40,})", out)
          if not m:
              raise SystemExit("Could not parse SHA1 from keytool output.")

          sha1 = m.group(1).replace(":", "").lower()
          if sha1 not in certs:
              raise SystemExit(
                  "SHA-1 mismatch. "
                  f"keystore={sha1} not in google-services.json certs={certs}"
              )

          print("google-services.json SHA-1 matches debug keystore.")
          PY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Comment APK download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Android APK 빌드 완료\n\n**커밋:** \`${{ github.sha }}\`\n\n[APK 다운로드](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) → Artifacts 탭에서 \`app-debug-${{ github.sha }}\` 다운로드\n\n> 유효기간: 7일`
            })
