name: Build Android APK

on:
  push:
    branches:
      - master
      - 'claude/**'
  pull_request:
    branches:
      - master
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Comment APK download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Android APK 빌드 완료\n\n**커밋:** \`${{ github.sha }}\`\n\n[APK 다운로드](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) → Artifacts 탭에서 \`app-debug-${{ github.sha }}\` 다운로드\n\n> 유효기간: 7일`
            })
